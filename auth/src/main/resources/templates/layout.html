<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Sistema de Autenticación</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="/dashboard">🔐 Sistema de Autenticación</a>
            </div>
            <div class="nav-menu" th:if="${#authentication.isAuthenticated()}">
                <a href="/users">Usuarios</a>
                <a href="/roles">Roles</a>
                <a href="/permissions">Permisos</a>
                <div class="nav-user">
                    <span sec:authentication="name"></span>
                    <a href="/logout" class="btn-logout">Salir</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="container">
        <th:block th:include="this :: content"></th:block>
    </main>
    
    <footer class="footer">
        <p>&copy; 2026 Sistema de Gestión de Autenticación y Permisos</p>
    </footer>
    
    <script src="/js/main.js"></script>
</body>
</html>
