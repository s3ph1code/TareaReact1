<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Usuario</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="/dashboard">🔐 Sistema de Autenticación</a>
            </div>
            <div class="nav-menu">
                <a href="/users">Usuarios</a>
                <a href="/roles">Roles</a>
                <a href="/permissions">Permisos</a>
                <div class="nav-user">
                    <span sec:authentication="name"></span>
                    <a href="/logout" class="btn-logout">Salir</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="container">
        <div class="form-container">
            <h1 th:text="${user.id == null ? 'Crear Usuario' : 'Editar Usuario'}"></h1>
            
            <form th:if="${user.id == null}" method="post" th:action="@{/users}" class="form-main">
                <div class="form-group">
                    <label for="username">Usuario:*</label>
                    <input type="text" id="username" name="username" th:value="${user.username}" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:*</label>
                    <input type="email" id="email" name="email" th:value="${user.email}" required>
                </div>
                
                <div class="form-group">
                    <label for="firstName">Nombre:</label>
                    <input type="text" id="firstName" name="firstName" th:value="${user.firstName}">
                </div>
                
                <div class="form-group">
                    <label for="lastName">Apellido:</label>
                    <input type="text" id="lastName" name="lastName" th:value="${user.lastName}">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:*</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="roleId">Rol (Opcional):</label>
                    <select id="roleId" name="roleId">
                        <option value="">-- Sin rol --</option>
                        <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Crear Usuario</button>
                    <a href="/users" class="btn-secondary">Cancelar</a>
                </div>
            </form>
            
            <form th:unless="${user.id == null}" th:action="@{/users/{id}/update(id=${user.id})}" method="post" class="form-main">
                <div class="form-group">
                    <label for="username">Usuario:*</label>
                    <input type="text" id="username" name="username" th:value="${user.username}" disabled>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:*</label>
                    <input type="email" id="email" name="email" th:value="${user.email}" required>
                </div>
                
                <div class="form-group">
                    <label for="firstName">Nombre:</label>
                    <input type="text" id="firstName" name="firstName" th:value="${user.firstName}">
                </div>
                
                <div class="form-group">
                    <label for="lastName">Apellido:</label>
                    <input type="text" id="lastName" name="lastName" th:value="${user.lastName}">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Actualizar Usuario</button>
                    <a href="/users" class="btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    
    <footer class="footer">
        <p>&copy; 2026 Sistema de Gestión de Autenticación y Permisos</p>
    </footer>
</body>
</html>
